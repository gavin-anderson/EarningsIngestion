services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    restart: unless-stopped
    ports:
      # HTTP/Play UI bind address comes from CH_HTTP_BIND (default loopback).
      # Set CH_HTTP_BIND=<tailnet-ip> in .env to reach Play over Tailscale.
      # Binding to the specific tailnet IP (not 0.0.0.0) keeps it off the
      # public internet even though Docker bypasses ufw for published ports.
      - "${CH_HTTP_BIND:-127.0.0.1}:8123:8123"   # HTTP / Play UI
      - "127.0.0.1:9000:9000"   # native protocol (ingester connects here)
      - "127.0.0.1:9363:9363"   # prometheus metrics (alloy scrapes this)
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
      - ./clickhouse-config/prometheus.xml:/etc/clickhouse-server/config.d/prometheus.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      CLICKHOUSE_DB: hl
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CH_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1

  # Backup tool. Not started by `up -d` (profile "backup"); invoked on demand /
  # by cron via `docker compose --profile backup run --rm clickhouse-backup ...`.
  # Shares the data volume so it can read parts, and reaches ClickHouse over the
  # compose network. All config comes from env (secrets live in .env).
  clickhouse-backup:
    image: altinity/clickhouse-backup:latest
    container_name: clickhouse-backup
    profiles: ["backup"]
    environment:
      LOG_LEVEL: info
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
      CLICKHOUSE_USERNAME: default
      CLICKHOUSE_PASSWORD: ${CH_PASSWORD}
      REMOTE_STORAGE: sftp
      SFTP_ADDRESS: ${SFTP_ADDRESS}
      SFTP_PORT: ${SFTP_PORT:-23}
      SFTP_USERNAME: ${SFTP_USERNAME}
      SFTP_PASSWORD: ${SFTP_PASSWORD}
      SFTP_PATH: ${SFTP_PATH:-clickhouse-backup}
      BACKUPS_TO_KEEP_REMOTE: "7"
      BACKUPS_TO_KEEP_LOCAL: "0"
    volumes:
      - clickhouse-data:/var/lib/clickhouse

volumes:
  clickhouse-data:
  clickhouse-logs:
